name: quality

on:
  push:
  pull_request:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run quality
