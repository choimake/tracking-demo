name: gitleaks

on:
  push:
  pull_request:

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization リポジトリのみ必要。個人アカウントでは不要。
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
